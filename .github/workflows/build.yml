name: novGPU CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'

jobs:
  # ─────────────────────────────────────────
  # 1. Build & Test
  # ─────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Run Unit Tests
        run: ./gradlew test --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: novGPU-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 7

  # ─────────────────────────────────────────
  # 2. Code Quality
  # ─────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  # ─────────────────────────────────────────
  # 3. Release Build (only on release tags)
  # ─────────────────────────────────────────
  release:
    name: Release Build & Sign
    runs-on: ubuntu-latest
    needs: [ build, lint ]
    if: github.event_name == 'release' && github.event.action == 'created'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true

      - name: Build Release AAB (for Play Store)
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: novGPU-release-aab-${{ github.sha }}
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

  # ─────────────────────────────────────────
  # 4. Notify on success
  # ─────────────────────────────────────────
  notify:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [ build, lint ]
    if: always()
    steps:
      - name: Build Status
        run: |
          echo "====================================="
          echo "  novGPU Build Complete"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Status: ${{ needs.build.result }}"
          echo "====================================="
